name: Playwright Tests with Xray Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'  # Lundi à Vendredi à 9h

env:
  NODE_VERSION: '18'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: self-hosted
    timeout-minutes: 30
    
    outputs:
      tests_passed: ${{ steps.test-results.outputs.passed }}
      tests_failed: ${{ steps.test-results.outputs.failed }}
      tests_total: ${{ steps.test-results.outputs.total }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright
        run: npx playwright install chromium
      
      - name: Create results directory
        shell: powershell
        run: |
          if (!(Test-Path "test-results")) { 
            New-Item -ItemType Directory -Path "test-results" 
          }
      
      - name: Run Playwright tests
        id: run-tests
        run: npx playwright test
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME }}
          LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}
          ENV: local
      
      - name: Check test results
        id: test-results
        shell: powershell
        run: |
          if (Test-Path "test-results/junit.xml") {
            Write-Host "✅ junit.xml generated"
            
            # Parser les résultats
            [xml]$junit = Get-Content "test-results/junit.xml"
            $total = $junit.testsuites.tests
            $failures = $junit.testsuites.failures
            $errors = $junit.testsuites.errors
            $failed = [int]$failures + [int]$errors
            $passed = [int]$total - $failed
            
            Write-Host "Results: $passed/$total passed"
            
            # Outputs
            echo "total=$total" >> $env:GITHUB_OUTPUT
            echo "passed=$passed" >> $env:GITHUB_OUTPUT
            echo "failed=$failed" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ junit.xml not found"
            exit 1
          }
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  publish-to-xray:
    name: Publish Results to Xray
    if: always()
    needs: [test]
    runs-on: self-hosted
    timeout-minutes: 10
    
    outputs:
      test_execution_key: ${{ steps.xray-upload.outputs.test_execution_key }}
      test_execution_url: ${{ steps.xray-upload.outputs.test_execution_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results
      
      - name: Verify JUnit file
        shell: powershell
        run: |
          if (Test-Path "test-results/junit.xml") {
            Write-Host "✅ junit.xml found" -ForegroundColor Green
            $size = (Get-Item "test-results/junit.xml").Length
            Write-Host "   Size: $size bytes"
          } else {
            Write-Host "❌ junit.xml NOT found" -ForegroundColor Red
            Write-Host "Contents of test-results:"
            Get-ChildItem "test-results" -Recurse
            exit 1
          }
      
      - name: Authenticate with Xray
        run: node scripts/xray-authenticate.js
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      
      - name: Upload to Xray
        id: xray-upload
        run: node scripts/xray-upload-complete.js
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          XRAY_TEST_PLAN_KEY: ${{ secrets.XRAY_TEST_PLAN_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
      
      - name: Upload Xray summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xray-summary
          path: test-results/xray-summary.json
          retention-days: 30

  comment-pr:
    name: Comment PR with Results
    if: always() && github.event_name == 'pull_request'
    needs: [test, publish-to-xray]
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download summaries
        uses: actions/download-artifact@v4
        with:
          pattern: '*-summary'
          path: summaries
      
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let summary, xraySummary;
            
            try {
              summary = JSON.parse(fs.readFileSync('summaries/test-results/summary.json', 'utf8'));
            } catch (e) {
              summary = { total: 0, passed: 0, failed: 0, skipped: 0, successRate: 0 };
            }
            
            try {
              xraySummary = JSON.parse(fs.readFileSync('summaries/xray-summary/xray-summary.json', 'utf8'));
            } catch (e) {
              xraySummary = null;
            }
            
            const successRate = summary.successRate || 0;
            const emoji = successRate === 100 ? '🎉' : successRate >= 80 ? '✅' : '⚠️';
            
            let comment = `## ${emoji} Test Results - Run #${context.runNumber}
            
            | Metric | Value |
            |--------|-------|
            | **Total** | ${summary.total} |
            | ✅ **Passed** | ${summary.passed} |
            | ❌ **Failed** | ${summary.failed} |
            | ⏭️ **Skipped** | ${summary.skipped} |
            | 📊 **Success Rate** | **${successRate}%** |
            `;
            
            if (xraySummary) {
              comment += `
            ### 📋 Xray Integration
            
            - **Test Execution**: [${xraySummary.testExecutionKey}](${xraySummary.testExecutionUrl})
            - **Test Plan**: ${xraySummary.testPlanKey || 'N/A'}
            - **Uploaded**: ${new Date(xraySummary.uploadedAt).toLocaleString()}
            
            > 💡 Import results in Xray: Open the Test Execution → "..." menu → "Import Execution Results" → Select JUnit format → Choose attached file
            `;
            }
            
            comment += `
            ### 🔗 Links
            
            - [GitHub Actions Run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            - [Playwright Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts)
            
            ---
            *Automated tests on local XAMPP with Xray integration*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  summary:
    name: Build Summary
    if: always()
    needs: [test, publish-to-xray]
    runs-on: self-hosted
    
    steps:
      - name: Generate Job Summary
        shell: powershell
        run: |
          $summary = @"
          # 🧪 Playwright Test Execution Summary
          
          ## Test Results
          - **Total**: ${{ needs.test.outputs.tests_total }}
          - **Passed**: ${{ needs.test.outputs.tests_passed }}
          - **Failed**: ${{ needs.test.outputs.tests_failed }}
          
          ## Xray Integration
          - **Test Execution**: [${{ needs.publish-to-xray.outputs.test_execution_key }}](${{ needs.publish-to-xray.outputs.test_execution_url }})
          
          ## Next Steps
          1. Open the Test Execution in Jira
          2. Import the attached JUnit XML file
          3. All test results will be automatically linked
          
          ---
          *Generated at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')*
          "@
          
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
